services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mempool
      POSTGRES_PASSWORD: mempool
      POSTGRES_DB: mempool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mempool"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: orchestrator
    depends_on:
      - redpanda
      - postgres
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - POSTGRES_DSN=postgresql+asyncpg://mempool:mempool@postgres:5432/mempool
    command: ["sleep", "infinity"]

volumes:
  postgres_data:
