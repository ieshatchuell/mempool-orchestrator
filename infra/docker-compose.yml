services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  orchestrator:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: orchestrator
    depends_on:
      - redpanda
      - ollama
    environment:
      - DUCKDB_PATH=/app/data/market/mempool_data.duckdb
      - AGENT_HISTORY_PATH=/app/data/history/agent_history.duckdb
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ../data/market:/app/data/market:ro    # Read-only market data
      - ../data/history:/app/data/history:rw  # Read-write agent history
    command: uv run python -m src.orchestrator.main

volumes:
  ollama_data:
