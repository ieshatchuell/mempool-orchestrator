services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  orchestrator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: orchestrator
    depends_on:
      - redpanda
      - ollama
    environment:
      - DUCKDB_PATH=/app/data/mempool_data.duckdb
      - AGENT_HISTORY_PATH=/app/agent_history.duckdb
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ..:/app/data:ro  # Read-only mount of project root
      - ../agent_history.duckdb:/app/agent_history.duckdb:rw  # RW for agent decisions
    command: uv run python -m src.orchestrator.main

volumes:
  ollama_data:
